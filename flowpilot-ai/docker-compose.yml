version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flowpilot-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: flowpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowpilot-backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app  # Optional: for hot reloading backend in docker
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:root@db:5432/flowpilot
      - HOST=0.0.0.0
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowpilot-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Avoid overwriting node_modules inside container
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures Vite hot reload works in Windows/Docker

volumes:
  postgres_data:
